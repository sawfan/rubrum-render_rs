# Transit example data (ChartData)
#
# This file deserializes into:
# - ChartData
#
# Transit charts typically have at least two datasets:
# - natal (reference chart)
# - transit (current sky)
#
# The layout can then bind lanes to either dataset, and aspect lanes can compute:
# - natal aspects (within one dataset)
# - cross aspects (between natal and transit)

[data]

# House cusp sets.
#
# Multi-wheel charts may want distinct cusp grids for each wheel.
#
# NOTE: `data.house_sets` is the preferred representation for multiple cusp sets.
# The legacy `data.house_cusps` field can only represent a single set.

[[data.house_sets]]
id = "natal"

# Natal house cusps.
[[data.house_sets.house_cusps]]
house = "First"
sign_degree = { sign = "Scorpio", degree = 24.0, minutes = 31.0 }

