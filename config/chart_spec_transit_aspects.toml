# Aspect computation rules for the transit example.
#
# This file is intentionally separate from:
# - data (placements/cusps)
# - layout/theme (rendering)
#
# NOTE: current aspect computation in the renderer is natal-style (within one dataset).
# This rules file can still be used for a transit dataset, but cross-dataset aspects are
# not computed yet.

[rules]
include_bodies = true
include_chart_points = false
include_angles = false
include_lots = false

# Major aspects (customize as desired)
[[rules.aspects]]
kind = "Conjunction"
orb_deg = 8.0

[[rules.aspects]]
kind = "Sextile"
orb_deg = 4.0

[[rules.aspects]]
kind = "Square"
orb_deg = 6.0

[[rules.aspects]]
kind = "Trine"
orb_deg = 6.0

[[rules.aspects]]
kind = "Opposition"
orb_deg = 8.0

