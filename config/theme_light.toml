# Shared light theme for spec examples.
#
# This file deserializes into:
# - Theme

[theme]

# Default glyph coloring. These values are intentionally editable: e.g. users who prefer
# earth as brown can override `theme.glyphs.signs.by_element.earth`.
[theme.glyphs.signs.by_element]
fire = { color = { r = 0.78, g = 0.12, b = 0.08, a = 1.0 } }
earth = { color = { r = 0.25, g = 0.48, b = 0.18, a = 1.0 } }
air = { color = { r = 0.72, g = 0.52, b = 0.06, a = 1.0 } }
water = { color = { r = 0.10, g = 0.32, b = 0.75, a = 1.0 } }

[theme.glyphs.occupants.by_occupant]
sun = { color = { r = 0.86, g = 0.52, b = 0.02, a = 1.0 } }
moon = { color = { r = 0.42, g = 0.48, b = 0.60, a = 1.0 } }
mercury = { color = { r = 0.38, g = 0.42, b = 0.46, a = 1.0 } }
venus = { color = { r = 0.72, g = 0.20, b = 0.48, a = 1.0 } }
mars = { color = { r = 0.78, g = 0.10, b = 0.06, a = 1.0 } }
jupiter = { color = { r = 0.76, g = 0.34, b = 0.08, a = 1.0 } }
saturn = { color = { r = 0.45, g = 0.36, b = 0.22, a = 1.0 } }
uranus = { color = { r = 0.04, g = 0.58, b = 0.60, a = 1.0 } }
neptune = { color = { r = 0.12, g = 0.24, b = 0.72, a = 1.0 } }
pluto = { color = { r = 0.48, g = 0.22, b = 0.62, a = 1.0 } }

[theme.aspects]
enabled = true
radius_factor = 1.0
require_endpoints_present = true

[[theme.aspects.kind_styles]]
kind = "trine"
stroke = { color = { r = 0.10, g = 0.32, b = 0.75, a = 1.0 }, width = 1.1, alpha = 0.68 }

[[theme.aspects.kind_styles]]
kind = "sextile"
stroke = { color = { r = 0.10, g = 0.32, b = 0.75, a = 1.0 }, width = 1.0, alpha = 0.62, dash = [4.0, 3.0] }

[[theme.aspects.kind_styles]]
kind = "square"
stroke = { color = { r = 0.78, g = 0.12, b = 0.08, a = 1.0 }, width = 1.25, alpha = 0.72 }

[[theme.aspects.kind_styles]]
kind = "opposition"
stroke = { color = { r = 0.78, g = 0.12, b = 0.08, a = 1.0 }, width = 1.35, alpha = 0.76 }

[[theme.aspects.kind_styles]]
kind = "conjunction"
stroke = { color = { r = 0.05, g = 0.05, b = 0.05, a = 1.0 }, width = 1.1, alpha = 0.55 }

[[theme.aspects.kind_styles]]
kind = "quincunx"
stroke = { color = { r = 0.48, g = 0.22, b = 0.62, a = 1.0 }, width = 0.95, alpha = 0.55, dash = [2.0, 3.0] }

[theme.aspects.stroke]
# color omitted => falls back to `theme.effective_base_colors().muted`
width = 1.2
alpha = 0.55

[theme.cairo]
occupant_glyph_mode = "PreferSvgFallbackText"
occupant_symbol_size = 25.0
placement_collision_avoidance = false

# Prefer the black glyph set on light backgrounds.
# (This is intentionally explicit; we are treating light mode as just another theme.)
glyph_set = "black"

[theme.svg]
# Tight SVG wheel canvas for chart composition.
fill_canvas = true
fill_canvas_margin_px = 0.0

[theme.dataset_colors]
# A subtle near-black used for glyph/text defaults when a dataset color is used.

# Optional aspect-grid palette overrides.
#
# If omitted, the aspect-grid renderer derives sensible defaults from the theme.
[theme.svg.aspect_grid]
canvas_bg = { r = 1.0, g = 1.0, b = 1.0, a = 1.0 }
cell_bg = { r = 0.95, g = 0.96, b = 0.97, a = 1.0 }
grid_line = { r = 0.05, g = 0.05, b = 0.05, a = 0.20 }
text = { r = 0.05, g = 0.05, b = 0.05, a = 1.0 }

natal = { r = 0.05, g = 0.05, b = 0.05, a = 1.0 }

