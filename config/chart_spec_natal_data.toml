# Datasets are named placement lists used by dataset-bound lanes.
#
# DatasetData = { id = String, bodies = Vec<PlacementMotion> }
# PlacementMotion = { placement = Placement, motion = Motion }

[[data.datasets]]
id = "natal"

# Planets / bodies.
